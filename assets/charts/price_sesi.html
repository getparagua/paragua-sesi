<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>html,body{margin:0;padding:0;background:#0d1117;}</style>
</head>
<body>
  <div id="chart" style="width:100%;height:560px;"></div>
  <script src="https://cdn.plot.ly/plotly-3.4.0.min.js" crossorigin="anonymous"></script>
  <script>
  (function(){
    // deterministic pseudo-random (LCG)
    let _s = 42;
    function rand(){ _s = (_s * 1664525 + 1013904223) & 0xffffffff; return (_s >>> 0) / 0xffffffff; }

    // 365 daily dates ending 2026-03-13
    const end = new Date('2026-03-13');
    const dates = [];
    for (let i = 364; i >= 0; i--){
      const d = new Date(end); d.setDate(d.getDate() - i);
      dates.push(d.toISOString().slice(0,10));
    }

    // synthetic OMIE: seasonal base + deterministic noise
    const seasonal = [85,78,68,52,48,43,46,54,66,76,88,92];
    const prices = dates.map(ds => {
      const m = new Date(ds).getMonth();
      return Math.max(12, Math.min(175, seasonal[m] + (rand()-0.5)*32 + (rand()-0.5)*14));
    });

    // SESI percentile: rank of 30-day rolling avg of price
    const sesi = dates.map((_, i) => {
      const win = prices.slice(Math.max(0, i-29), i+1);
      const avg = win.reduce((a,b)=>a+b,0)/win.length;
      const hist = prices.slice(0, i+1);
      const below = hist.filter(p=>p<=avg).length;
      return Math.min(99, Math.max(1, Math.round(below/hist.length*100)));
    });

    const barColors = prices.map(p => p>110?'#f97316': p>70?'#fbbf24':'#38bdf8');

    Plotly.newPlot('chart', [
      {
        type:'bar', name:'OMIE day-ahead (€/MWh)',
        x:dates, y:prices, yaxis:'y',
        marker:{ color:barColors, opacity:0.75 },
      },
      {
        type:'scatter', mode:'lines', name:'SESI percentile',
        x:dates, y:sesi, yaxis:'y2',
        line:{ color:'#a78bfa', width:2 },
      },
    ], {
      paper_bgcolor:'#0d1117', plot_bgcolor:'#161b22',
      font:{ color:'#c9d1d9', family:'system-ui,sans-serif', size:12 },
      title:{ text:'OMIE Price vs SESI — last 365 days', x:0.5, xanchor:'center' },
      xaxis:{ title:{text:'Date'}, gridcolor:'#30363d', linecolor:'#30363d', zerolinecolor:'#484f58' },
      yaxis:{
        title:{ text:'OMIE (€/MWh)', font:{color:'#38bdf8'} },
        gridcolor:'#30363d', linecolor:'#30363d', tickfont:{color:'#38bdf8'},
      },
      yaxis2:{
        title:{ text:'SESI percentile (0–100)', font:{color:'#a78bfa'} },
        overlaying:'y', side:'right', range:[0,100],
        gridcolor:'rgba(0,0,0,0)', tickfont:{color:'#a78bfa'},
      },
      legend:{ orientation:'h', x:0.5, xanchor:'center', y:-0.20, yanchor:'top' },
      barmode:'overlay',
      height:560,
      margin:{ l:60, r:65, t:80, b:90 },
      hovermode:'x unified',
    }, {responsive:true});
  })();
  </script>
</body>
</html>
